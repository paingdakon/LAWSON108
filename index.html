<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAWSON 108 — Gift Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --dark: #0f0e0b;
      --cream: #f5f0e8;
      --text-muted: #8a8070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    /* CSS Gift Card */
    .card-visual {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1.586;
      background: linear-gradient(135deg, #1e1b12 0%, #2a2516 40%, #1a1610 100%);
      border-radius: 18px;
      border: 1px solid rgba(201,168,76,0.25);
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.15);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }
    .card-visual::before {
      content: '';
      position: absolute;
      top: -50%; left: -20%;
      width: 60%; height: 200%;
      background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.07) 50%, transparent 60%);
      animation: shimmer 4s ease-in-out infinite;
    }
    .card-shine {
      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      border-radius: 18px 18px 0 0;
    }
    .card-content {
      position: absolute;
      inset: 0;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--gold-light);
      letter-spacing: 1px;
    }
    .card-chip {
      width: 36px; height: 28px;
      background: linear-gradient(135deg, #c9a84c, #e8cc7a, #a07830);
      border-radius: 5px;
      opacity: 0.8;
    }
    .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .card-type {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }
    .circle { width: 32px; height: 32px; border-radius: 50%; opacity: 0.5; }
    .circle-1 { background: var(--gold); margin-right: -12px; }
    .circle-2 { background: var(--gold-light); }

    .heading {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }
    .heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 8vw, 48px);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .heading h1 em { font-style: italic; color: var(--gold-light); }
    .heading p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      font-weight: 300;
      max-width: 340px;
      margin: 0 auto;
    }
    .features {
      display: flex;
      gap: 12px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }
    .feature {
      flex: 1;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .feature-icon { font-size: 20px; margin-bottom: 8px; }
    .feature-text {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      line-height: 1.4;
    }
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }
    .buy-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.6s forwards;
    }
    .buy-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    #product-component-1773762208428 { width: 100%; }
    .trust {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.75s forwards;
    }
    .trust-item { font-size: 11px; color: var(--text-muted); }
    .trust-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(201,168,76,0.3);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%, 100% { transform: translateX(-30%); }
      50%       { transform: translateX(80%); }
    }
    @media (max-width: 420px) {
      .features { flex-direction: column; }
      .trust { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="label">✦ LAWSON 108 ✦</div>

    <div class="card-visual">
      <div class="card-shine"></div>
      <div class="card-content">
        <div class="card-top">
          <div class="card-logo">LAWSON 108</div>
          <div class="card-chip"></div>
        </div>
        <div class="card-bottom">
          <div class="card-type">Gift Card</div>
          <div style="display:flex;">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="heading">
      <h1>The perfect<br><em>gift</em> for anyone</h1>
      <p>Give the freedom to choose. Redeemable on everything in our store, with no expiry date.</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">✉️</div>
        <div class="feature-text">Delivered instantly by email</div>
      </div>
      <div class="feature">
        <div class="feature-icon">∞</div>
        <div class="feature-text">Never expires</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🛍</div>
        <div class="feature-text">Use on any product</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="buy-section">
      <div class="buy-label">Get yours now</div>
      <div id='product-component-1773762208428'></div>
    </div>

    <div class="trust">
      <div class="trust-item">🔒 Secure checkout</div>
      <div class="trust-dot"></div>
      <div class="trust-item">⚡ Instant delivery</div>
      <div class="trust-dot"></div>
      <div class="trust-item">💬 24/7 support</div>
    </div>

  </div>

  <script type="text/javascript">
  (function () {
    var scriptURL = 'https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js';
    if (window.ShopifyBuy) {
      if (window.ShopifyBuy.UI) { ShopifyBuyInit(); } else { loadScript(); }
    } else { loadScript(); }
    function loadScript() {
      var script = document.createElement('script');
      script.async = true;
      script.src = scriptURL;
      (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
      script.onload = ShopifyBuyInit;
    }
    function ShopifyBuyInit() {
      var client = ShopifyBuy.buildClient({
        domain: '1irsg0-mf.myshopify.com',
        storefrontAccessToken: '0da4c9ee7e50d2bc70eed8ffdc037f1a',
      });
      ShopifyBuy.UI.onReady(client).then(function (ui) {
        ui.createComponent('product', {
          id: '10073800671552',
          node: document.getElementById('product-component-1773762208428'),
          moneyFormat: '%24%7B%7Bamount%7D%7D',
          options: {
            "product": {
              "styles": {
                "product": {
                  "@media (min-width: 601px)": {
                    "max-width": "100%",
                    "margin-left": "0px",
                    "margin-bottom": "0px"
                  }
                },
                "button": {
                  "font-family": "'DM Sans', sans-serif",
                  "font-size": "14px",
                  "letter-spacing": "2px",
                  "text-transform": "uppercase",
                  "padding-top": "18px",
                  "padding-bottom": "18px",
                  "padding-left": "0px",
                  "padding-right": "0px",
                  "width": "100%",
                  "background-color": "#c9a84c",
                  "color": "#0f0e0b",
                  "border-radius": "10px",
                  ":hover": { "background-color": "#e8cc7a" },
                  ":focus": { "background-color": "#e8cc7a" }
                },
                "price": {
                  "font-family": "'Playfair Display', serif",
                  "font-size": "32px",
                  "color": "#f5f0e8",
                  "text-align": "center"
                },
                "title": { "display": "none" },
                "description": { "display": "none" }
              },
              "buttonDestination": "checkout",
              "contents": {
                "img": false,
                "imgWithCarousel": false,
                "title": false,
                "description": false
              },
              "width": "100%",
              "text": { "button": "Buy Now — Gift Card" }
            },
            "option": {
              "styles": {
                "label": {
                  "font-family": "'DM Sans', sans-serif",
                  "font-size": "11px",
                  "letter-spacing": "2px",
                  "text-transform": "uppercase",
                  "color": "#8a8070"
                },
                "select": {
                  "font-family": "'DM Sans', sans-serif",
                  "background-color": "transparent",
                  "border": "1px solid rgba(201,168,76,0.3)",
                  "border-radius": "8px",
                  "color": "#f5f0e8",
                  "padding": "10px 14px",
                  "width": "100%"
                }
              }
            },
            "cart": {
              "text": { "total": "Subtotal", "button": "Checkout" }
            },
            "toggle": {}
          },
        });
      });
    }
  })();
  </script>
</body>
</html>
